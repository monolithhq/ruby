<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .icon-wrap {
    width: 180px;
    height: 180px;
    position: relative;
  }

  svg {
    overflow: visible;
  }

  /* the shard outline, always visible faintly */
  .outline {
    fill: none;
    stroke: #4a0509;
    stroke-width: 2;
  }

  /* the red fill, clipped by the shard shape */
  .fill-group {
    clip-path: url(#shardClip);
  }

  .liquid {
    fill: #B0060F;
    transform: translateY(100px);
    animation: rise 2.6s cubic-bezier(0.65, 0, 0.35, 1) forwards;
  }

  .wave {
    fill: #B0060F;
  }

  @keyframes rise {
    0% {
      transform: translateY(105px);
    }
    75% {
      transform: translateY(-6px);
    }
    88% {
      transform: translateY(2px);
    }
    100% {
      transform: translateY(0px);
    }
  }

  .glow {
    opacity: 0;
    animation: glowPulse 1.2s ease-out 2.4s forwards;
  }

  @keyframes glowPulse {
    0% { opacity: 0; filter: drop-shadow(0 0 0px #B0060F); }
    40% { opacity: 1; filter: drop-shadow(0 0 24px #B0060F); }
    100% { opacity: 1; filter: drop-shadow(0 0 8px #B0060F); }
  }

  .wordmark {
    font-family: 'Arial Black', 'Arial', sans-serif;
    font-weight: 900;
    letter-spacing: 4px;
    font-size: 32px;
    color: #ffffff;
    opacity: 0;
    animation: fadeInText 0.8s ease-out 2.5s forwards;
  }

  @keyframes fadeInText {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="icon-wrap glow">
    <svg width="180" height="180" viewBox="0 0 100 100">
      <defs>
        <clipPath id="shardClip">
          <polygon points="20,15 85,15 65,50 85,85 20,85 40,50"/>
        </clipPath>
      </defs>

      <!-- faint outline always visible -->
      <polygon class="outline" points="20,15 85,15 65,50 85,85 20,85 40,50"/>

      <!-- liquid fill, clipped to shard shape -->
      <g class="fill-group">
        <g class="liquid">
          <rect x="0" y="0" width="100" height="120" />
          <path class="wave" d="M -10 0 Q 0 -6 15 0 T 40 0 T 65 0 T 90 0 T 115 0 V 10 H -10 Z" />
        </g>
      </g>
    </svg>
  </div>

  <div class="wordmark">RUBY</div>
</div>

</body>
</html>
